<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiz Univalle</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>Quiz Institucional – Universidad del Valle</header>
  
  <div class="score-counter" id="score">Correctas: 0</div>
  
  <div class="container" id="quiz-container">
    <h2 id="question-number">Pregunta 1 de 10</h2>
    <p id="question-text">Aquí irá la pregunta</p>
    
    <div class="options-grid">
      <button class="option">Opción A</button>
      <button class="option">Opción B</button>
      <button class="option">Opción C</button>
      <button class="option">Opción D</button>
    </div>

    <button id="nextBtn">Siguiente</button>
  </div>

  <script src="js/quiz.js"></script>
</body>
</html>
